<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Pet</title>
    <style>
      :root {
        --ink: #241f1a;
        --muted: #6e6458;
        --shell: rgba(249, 239, 219, 0.94);
        --shell-deep: rgba(232, 216, 188, 0.98);
        --accent: #0f7a57;
        --accent-strong: #0a6145;
        --accent-soft: rgba(15, 122, 87, 0.14);
        --shadow: rgba(32, 27, 21, 0.26);
      }

      * {
        box-sizing: border-box;
        user-select: none;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
        color: var(--ink);
      }

      body {
        display: grid;
        place-items: center;
      }

      .pet-shell {
        position: relative;
        width: 226px;
        min-height: 292px;
        padding: 16px 16px 14px;
        border-radius: 34px 34px 30px 30px;
        -webkit-app-region: drag;
        background:
          radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.82), transparent 30%),
          radial-gradient(circle at 15% 12%, rgba(255, 255, 255, 0.5), transparent 12%),
          radial-gradient(circle at 85% 18%, rgba(255, 255, 255, 0.34), transparent 14%),
          linear-gradient(180deg, var(--shell) 0%, var(--shell-deep) 100%);
        border: 1px solid rgba(103, 85, 53, 0.18);
        box-shadow:
          0 22px 55px var(--shadow),
          inset 0 1px 0 rgba(255, 255, 255, 0.74);
        animation: floaty 4.8s ease-in-out infinite;
      }

      .pet-shell::before,
      .pet-shell::after {
        content: "";
        position: absolute;
        top: 20px;
        width: 48px;
        height: 48px;
        border-radius: 18px 18px 8px 8px;
        background: linear-gradient(180deg, #2b9a73 0%, var(--accent-strong) 100%);
        box-shadow: 0 10px 20px rgba(15, 122, 87, 0.18);
        z-index: -1;
      }

      .pet-shell::before {
        left: 22px;
        transform: rotate(-18deg);
      }

      .pet-shell::after {
        right: 22px;
        transform: rotate(18deg);
      }

      .pet-topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }

      .pet-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.58);
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.02em;
      }

      .pet-badge::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-soft);
      }

      .pet-closehint {
        color: rgba(36, 31, 26, 0.45);
        font-size: 11px;
      }

      .pet-face {
        width: 110px;
        height: 110px;
        margin: 2px auto 10px;
        border-radius: 34px;
        position: relative;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 22%, rgba(255, 255, 255, 0.58), transparent 28%),
          linear-gradient(180deg, #24a078 0%, var(--accent) 100%);
        box-shadow:
          0 14px 28px rgba(15, 122, 87, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.35);
      }

      .pet-face::before,
      .pet-face::after {
        content: "";
        position: absolute;
        top: 42px;
        width: 12px;
        height: 18px;
        border-radius: 999px;
        background: #fff7ea;
        box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.08);
      }

      .pet-face::before {
        left: 34px;
      }

      .pet-face::after {
        right: 34px;
      }

      .face-dot {
        position: absolute;
        top: 54px;
        left: 50%;
        width: 32px;
        height: 10px;
        transform: translateX(-50%);
        border-radius: 999px;
        border-bottom: 3px solid rgba(255, 247, 234, 0.96);
      }

      h1 {
        margin: 0 0 6px;
        text-align: center;
        font-size: 18px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 12px;
        color: var(--muted);
        text-align: center;
        line-height: 1.55;
        font-size: 13px;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        width: fit-content;
        margin: 0 auto 14px;
        padding: 7px 11px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.62);
        color: var(--muted);
        font-size: 12px;
      }

      .status-pill::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-soft);
      }

      .button-list {
        display: grid;
        gap: 8px;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 14px;
        padding: 11px 12px;
        font: inherit;
        cursor: pointer;
        transition: transform 120ms ease, filter 120ms ease, opacity 120ms ease;
        -webkit-app-region: no-drag;
      }

      button:hover {
        transform: translateY(-1px);
        filter: brightness(1.02);
      }

      button:active {
        transform: translateY(0);
      }

      .primary {
        background: linear-gradient(180deg, #1a9a71 0%, var(--accent) 100%);
        color: white;
        box-shadow: 0 10px 18px rgba(15, 122, 87, 0.2);
      }

      .secondary {
        background: var(--accent-soft);
        color: var(--accent-strong);
      }

      .ghost {
        background: rgba(255, 255, 255, 0.58);
        color: var(--ink);
      }

      .footer-tip {
        margin-top: 10px;
        text-align: center;
        color: rgba(110, 100, 88, 0.88);
        font-size: 11px;
      }

      @keyframes floaty {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
    </style>
  </head>
  <body>
    <section class="pet-shell">
      <div class="pet-topline">
        <div class="pet-badge" id="statusPill">搜索窗口已隐藏</div>
        <div class="pet-closehint">桌宠壳</div>
      </div>

      <div class="pet-face" aria-hidden="true">
        <div class="face-dot"></div>
      </div>

      <h1>Agent 桌宠</h1>
      <p id="description">我负责常驻桌面，搜索面板需要时再唤起。</p>

      <div class="button-list">
        <button class="primary" id="openSearch">打开搜索窗口</button>
        <button class="secondary" id="hideSearch">隐藏搜索窗口</button>
        <button class="ghost" id="quitApp">退出应用</button>
      </div>

      <div class="footer-tip">桌宠主，搜索辅</div>
    </section>

    <script>
      const statusPill = document.getElementById("statusPill");
      const description = document.getElementById("description");

      function renderState(state) {
        const searchVisible = Boolean(state && state.searchVisible);
        if (searchVisible) {
          statusPill.textContent = "搜索窗口已打开";
          description.textContent = "搜索面板在前台工作，我会继续在桌面角落待机。";
          return;
        }

        statusPill.textContent = "搜索窗口已隐藏";
        description.textContent = "我负责常驻桌面，搜索面板需要时再唤起。";
      }

      document
        .getElementById("openSearch")
        .addEventListener("click", () => window.desktopShell.showSearchWindow());

      document
        .getElementById("hideSearch")
        .addEventListener("click", () => window.desktopShell.hideSearchWindow());

      document
        .getElementById("quitApp")
        .addEventListener("click", () => window.desktopShell.quitApp());

      window.desktopShell.onShellState((state) => {
        renderState(state);
      });

      window.desktopShell.getShellState().then((state) => {
        renderState(state);
      });
    </script>
  </body>
</html>
