<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feiling Desktop Pet</title>
    <style>
      :root {
        --ink: #2b211d;
        --muted: #7f6b62;
        --shell-top: rgba(255, 247, 241, 0.96);
        --shell-bottom: rgba(248, 233, 226, 0.98);
        --shell-edge: rgba(132, 95, 84, 0.18);
        --accent: #d4575d;
        --accent-strong: #b63d46;
        --accent-soft: rgba(212, 87, 93, 0.14);
        --shadow: rgba(53, 34, 30, 0.25);
      }

      * {
        box-sizing: border-box;
        user-select: none;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
        color: var(--ink);
      }

      body {
        display: grid;
        place-items: center;
      }

      .pet-shell {
        width: 286px;
        min-height: 460px;
        padding: 14px 14px 12px;
        border-radius: 34px 34px 28px 28px;
        border: 1px solid var(--shell-edge);
        background:
          radial-gradient(circle at 20% 10%, rgba(255, 255, 255, 0.74), transparent 16%),
          radial-gradient(circle at 78% 12%, rgba(255, 255, 255, 0.5), transparent 16%),
          linear-gradient(180deg, var(--shell-top) 0%, var(--shell-bottom) 100%);
        box-shadow:
          0 18px 46px var(--shadow),
          inset 0 1px 0 rgba(255, 255, 255, 0.82);
        -webkit-app-region: drag;
      }

      .pet-topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .pet-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.62);
        color: var(--muted);
        font-size: 12px;
      }

      .pet-badge::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #c39d86;
        box-shadow: 0 0 0 4px rgba(195, 157, 134, 0.14);
      }

      .pet-badge.active::before {
        background: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-soft);
      }

      .pet-closehint {
        color: rgba(43, 33, 29, 0.4);
        font-size: 11px;
      }

      .pet-stage {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 268px;
        margin-bottom: 8px;
        border-radius: 26px;
        background:
          radial-gradient(circle at 50% 14%, rgba(255, 255, 255, 0.78), transparent 28%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.64) 0%, rgba(255, 255, 255, 0.26) 100%);
        overflow: hidden;
      }

      .pet-stage::after {
        content: "";
        position: absolute;
        bottom: 16px;
        width: 148px;
        height: 18px;
        border-radius: 999px;
        background: rgba(80, 46, 42, 0.12);
        filter: blur(8px);
      }

      .pet-art {
        position: relative;
        z-index: 1;
        width: 222px;
        height: 320px;
        object-fit: contain;
        filter: drop-shadow(0 12px 18px rgba(70, 44, 41, 0.16));
      }

      h1 {
        margin: 0 0 4px;
        text-align: center;
        font-size: 18px;
        line-height: 1.15;
      }

      .state-line {
        margin: 0 0 6px;
        text-align: center;
        color: var(--accent-strong);
        font-size: 13px;
      }

      p {
        margin: 0 0 10px;
        color: var(--muted);
        text-align: center;
        line-height: 1.5;
        font-size: 12px;
      }

      .button-list,
      .state-list {
        display: grid;
        gap: 8px;
      }

      .state-list {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        margin-bottom: 8px;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 14px;
        padding: 10px 12px;
        font: inherit;
        cursor: pointer;
        transition: transform 120ms ease, filter 120ms ease, opacity 120ms ease;
        -webkit-app-region: no-drag;
      }

      button:hover {
        transform: translateY(-1px);
        filter: brightness(1.02);
      }

      button:active {
        transform: translateY(0);
      }

      button:disabled {
        cursor: default;
        opacity: 0.52;
        transform: none;
        filter: none;
      }

      .state-button {
        padding: 8px 0;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.68);
        color: var(--muted);
        font-size: 12px;
      }

      .state-button.active {
        background: var(--accent-soft);
        color: var(--accent-strong);
      }

      .primary {
        background: linear-gradient(180deg, #e36a70 0%, var(--accent) 100%);
        color: white;
        box-shadow: 0 10px 18px rgba(212, 87, 93, 0.22);
      }

      .secondary {
        background: rgba(212, 87, 93, 0.12);
        color: var(--accent-strong);
      }

      .ghost {
        background: rgba(255, 255, 255, 0.62);
        color: var(--ink);
      }

      .footer-tip {
        margin-top: 8px;
        text-align: center;
        color: rgba(111, 83, 74, 0.84);
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <section class="pet-shell">
      <div class="pet-topline">
        <div class="pet-badge" id="statusPill">搜索窗口已隐藏</div>
        <div class="pet-closehint">可拖动</div>
      </div>

      <div class="pet-stage">
        <img class="pet-art" id="petArt" alt="绯铃桌宠" />
      </div>

      <h1>绯铃</h1>
      <div class="state-line" id="stateLabel">待机</div>
      <p id="description">绯铃会安静待在桌面角落，等你开口。</p>

      <div class="state-list">
        <button class="state-button" data-state="idle">待机</button>
        <button class="state-button" data-state="happy_soft">开心</button>
        <button class="state-button" data-state="thinking">思考</button>
        <button class="state-button" data-state="confused">困惑</button>
        <button class="state-button" data-state="smug">得意</button>
      </div>

      <div class="button-list">
        <button class="primary" id="openSearch">唤起搜索</button>
        <button class="secondary" id="hideSearch">收起搜索</button>
        <button class="ghost" id="quitApp">退出桌宠</button>
      </div>

      <div class="footer-tip">当前先用静态状态图接入，动画后补。</div>
    </section>

    <script>
      const stateAssets = {
        idle: "../assets/characters/feiling/states/feiling_idle_v1.jpg",
        happy_soft: "../assets/characters/feiling/states/feiling_happy_soft_v1.jpg",
        thinking: "../assets/characters/feiling/states/feiling_thinking_v1.jpg",
        confused: "../assets/characters/feiling/states/feiling_confused_v1.jpg",
        smug: "../assets/characters/feiling/states/feiling_smug_v1.jpg",
      };

      const stateLabels = {
        idle: "待机",
        happy_soft: "开心",
        thinking: "思考",
        confused: "困惑",
        smug: "小得意",
      };

      const petArt = document.getElementById("petArt");
      const statusPill = document.getElementById("statusPill");
      const stateLabel = document.getElementById("stateLabel");
      const description = document.getElementById("description");
      const openSearchButton = document.getElementById("openSearch");
      const hideSearchButton = document.getElementById("hideSearch");
      const stateButtons = Array.from(document.querySelectorAll("[data-state]"));

      function renderState(state) {
        const searchVisible = Boolean(state && state.searchVisible);
        const activeState = state && state.petState ? state.petState : "idle";

        petArt.src = stateAssets[activeState];
        stateLabel.textContent = stateLabels[activeState] || "待机";
        description.textContent =
          (state && state.petDescription) || "绯铃会安静待在桌面角落，等你开口。";

        if (searchVisible) {
          statusPill.textContent = "搜索窗口已打开";
          statusPill.classList.add("active");
        } else {
          statusPill.textContent = "搜索窗口已隐藏";
          statusPill.classList.remove("active");
        }

        openSearchButton.disabled = searchVisible;
        hideSearchButton.disabled = !searchVisible;

        stateButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.state === activeState);
        });
      }

      document
        .getElementById("openSearch")
        .addEventListener("click", () => window.desktopShell.showSearchWindow());

      document
        .getElementById("hideSearch")
        .addEventListener("click", () => window.desktopShell.hideSearchWindow());

      document
        .getElementById("quitApp")
        .addEventListener("click", () => window.desktopShell.quitApp());

      stateButtons.forEach((button) => {
        button.addEventListener("click", () => {
          window.desktopShell.setPetState(button.dataset.state);
        });
      });

      window.desktopShell.onShellState((state) => {
        renderState(state);
      });

      window.desktopShell.getShellState().then((state) => {
        renderState(state);
      });
    </script>
  </body>
</html>
