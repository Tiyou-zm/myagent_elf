<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feiling Desktop Pet</title>
    <style>
      :root {
        --ink: #3d2925;
        --ink-soft: rgba(61, 41, 37, 0.72);
        --panel: rgba(255, 247, 242, 0.96);
        --panel-edge: rgba(135, 93, 83, 0.16);
        --accent: #d35f67;
        --accent-strong: #b74953;
        --accent-soft: rgba(211, 95, 103, 0.16);
        --shadow: rgba(53, 33, 30, 0.22);
      }

      * {
        box-sizing: border-box;
        user-select: none;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
        font-family: "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
      }

      body {
        display: grid;
        place-items: end center;
      }

      .pet-shell {
        position: relative;
        width: 252px;
        height: 402px;
        overflow: hidden;
      }

      .pet-hitbox {
        position: absolute;
        inset: 0 18px 0 0;
        display: grid;
        place-items: end center;
        z-index: 1;
        background: transparent;
        cursor: grab;
        touch-action: none;
      }

      .pet-hitbox.dragging {
        cursor: grabbing;
      }

      .pet-shadow {
        position: absolute;
        bottom: 10px;
        width: 122px;
        height: 18px;
        border-radius: 999px;
        background: rgba(59, 37, 34, 0.14);
        filter: blur(8px);
        pointer-events: none;
        transition:
          transform 160ms ease,
          opacity 160ms ease;
      }

      .pet-body {
        position: relative;
        display: grid;
        place-items: end center;
        pointer-events: none;
        transform-origin: center bottom;
        transition:
          transform 160ms ease,
          filter 160ms ease;
        will-change: transform;
      }

      .pet-hitbox:hover .pet-body,
      .pet-hitbox.hovering .pet-body {
        transform: translateY(-4px) scale(1.016);
        filter: drop-shadow(0 16px 22px rgba(77, 47, 44, 0.14));
      }

      .pet-hitbox:hover .pet-shadow,
      .pet-hitbox.hovering .pet-shadow {
        transform: scale(0.95);
        opacity: 0.88;
      }

      .pet-hitbox.pressed .pet-body {
        transform: translateY(1px) scale(0.985);
      }

      .pet-hitbox.pressed .pet-shadow {
        transform: scale(1.04);
      }

      .pet-hitbox.clicked .pet-body {
        animation: pet-click-bounce 220ms ease;
      }

      @keyframes pet-click-bounce {
        0% {
          transform: translateY(1px) scale(0.98);
        }

        45% {
          transform: translateY(-6px) scale(1.018);
        }

        100% {
          transform: translateY(0) scale(1);
        }
      }

      .pet-art {
        position: relative;
        z-index: 1;
        width: 208px;
        height: 358px;
        object-fit: contain;
        filter: drop-shadow(0 12px 18px rgba(73, 45, 42, 0.14));
        pointer-events: none;
      }

      .menu-anchor {
        position: absolute;
        top: 150px;
        right: 0;
        display: flex;
        align-items: center;
        gap: 4px;
        z-index: 5;
      }

      button {
        appearance: none;
        border: 0;
        font: inherit;
        cursor: pointer;
        transition:
          transform 120ms ease,
          filter 120ms ease,
          opacity 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        filter: brightness(1.02);
      }

      button:active {
        transform: translateY(0);
      }

      .menu-toggle {
        position: relative;
        width: 36px;
        height: 36px;
        border-radius: 999px;
        background: linear-gradient(180deg, #fee3d9 0%, #f7c6ba 100%);
        border: 1px solid rgba(175, 112, 95, 0.18);
        box-shadow:
          0 14px 24px rgba(61, 38, 35, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.78);
        color: var(--accent-strong);
      }

      .menu-toggle::before,
      .menu-toggle::after,
      .menu-toggle span {
        content: "";
        position: absolute;
        left: 50%;
        width: 16px;
        height: 2px;
        margin-left: -8px;
        border-radius: 999px;
        background: currentColor;
        transition: transform 140ms ease, opacity 140ms ease;
      }

      .menu-toggle::before {
        top: 11px;
      }

      .menu-toggle span {
        top: 17px;
      }

      .menu-toggle::after {
        top: 23px;
      }

      .menu-toggle.open::before {
        transform: translateY(6px) rotate(45deg);
      }

      .menu-toggle.open span {
        opacity: 0;
      }

      .menu-toggle.open::after {
        transform: translateY(-6px) rotate(-45deg);
      }

      .pet-menu {
        display: none;
        width: 184px;
        padding: 12px;
        border-radius: 18px;
        background:
          radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.78), transparent 26%),
          linear-gradient(180deg, var(--panel) 0%, rgba(251, 239, 232, 0.98) 100%);
        border: 1px solid var(--panel-edge);
        box-shadow: 0 16px 28px var(--shadow);
        pointer-events: none;
      }

      .pet-menu.open {
        display: block;
        pointer-events: auto;
      }

      .menu-title {
        color: var(--ink);
        font-size: 14px;
        font-weight: 700;
      }

      .menu-copy {
        margin-top: 4px;
        color: var(--ink-soft);
        font-size: 11px;
        line-height: 1.45;
      }

      .search-button {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        margin-top: 12px;
        padding: 11px 13px;
        border-radius: 14px;
        background: linear-gradient(180deg, #e26a71 0%, var(--accent) 100%);
        color: #fff;
        box-shadow: 0 10px 18px rgba(211, 95, 103, 0.22);
      }

      .search-label {
        display: grid;
        gap: 2px;
        text-align: left;
      }

      .search-label strong {
        font-size: 13px;
        font-weight: 700;
      }

      .search-label span {
        font-size: 11px;
        opacity: 0.84;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.62);
        box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.12);
      }

      .status-dot.active {
        background: #fff5cf;
        box-shadow: 0 0 0 4px rgba(255, 245, 207, 0.18);
      }
    </style>
  </head>
  <body>
    <section class="pet-shell">
      <div class="pet-hitbox" id="petHitbox" aria-label="绯铃桌宠">
        <div class="pet-body">
          <img
            class="pet-art"
            id="petArt"
            src="../assets/characters/feiling/base/feiling_master_v1.png"
            alt="绯铃桌宠"
          />
        </div>
        <div class="pet-shadow"></div>
      </div>

      <div class="menu-anchor">
        <div class="pet-menu" id="petMenu">
          <div class="menu-title">绯铃</div>
          <div class="menu-copy" id="menuCopy">
            默认安静待机。需要时，从这里唤起搜索窗口。
          </div>
          <button class="search-button" id="openSearch">
            <div class="search-label">
              <strong>打开搜索</strong>
              <span id="searchHint">唤起功能面板</span>
            </div>
            <div class="status-dot" id="searchDot"></div>
          </button>
        </div>

        <button class="menu-toggle" id="menuToggle" aria-label="打开菜单" aria-expanded="false">
          <span></span>
        </button>
      </div>
    </section>

    <script>
      const petHitbox = document.getElementById("petHitbox");
      const menuToggle = document.getElementById("menuToggle");
      const petMenu = document.getElementById("petMenu");
      const openSearchButton = document.getElementById("openSearch");
      const searchHint = document.getElementById("searchHint");
      const searchDot = document.getElementById("searchDot");
      const menuCopy = document.getElementById("menuCopy");

      let shellState = { searchVisible: false };
      let menuOpen = false;
      let dragSession = null;
      let clickBounceTimeoutId = null;

      function setMenuOpen(nextOpen) {
        menuOpen = nextOpen;
        petMenu.classList.toggle("open", menuOpen);
        menuToggle.classList.toggle("open", menuOpen);
        menuToggle.setAttribute("aria-expanded", menuOpen ? "true" : "false");
      }

      function renderShellState(nextState) {
        shellState = nextState || { searchVisible: false };

        if (shellState.searchVisible) {
          searchHint.textContent = "搜索窗口已打开";
          searchDot.classList.add("active");
          menuCopy.textContent = "搜索窗口已经在前台或后台待命，可以继续点击把它唤起到前面。";
        } else {
          searchHint.textContent = "唤起功能面板";
          searchDot.classList.remove("active");
          menuCopy.textContent = "默认安静待机。需要时，从这里唤起搜索窗口。";
        }
      }

      function clearClickBounce() {
        if (clickBounceTimeoutId) {
          clearTimeout(clickBounceTimeoutId);
          clickBounceTimeoutId = null;
        }
      }

      function playClickBounce() {
        clearClickBounce();
        petHitbox.classList.add("clicked");
        clickBounceTimeoutId = setTimeout(() => {
          petHitbox.classList.remove("clicked");
          clickBounceTimeoutId = null;
        }, 240);
      }

      async function beginDrag(event) {
        if (event.button !== 0) {
          return;
        }

        const bounds = await window.desktopShell.getPetBounds();
        if (!bounds) {
          return;
        }

        dragSession = {
          startScreenX: event.screenX,
          startScreenY: event.screenY,
          startX: bounds.x,
          startY: bounds.y,
          moved: false,
        };

        petHitbox.classList.add("pressed");
        petHitbox.setPointerCapture(event.pointerId);
      }

      function updateDrag(event) {
        if (!dragSession) {
          return;
        }

        const dx = event.screenX - dragSession.startScreenX;
        const dy = event.screenY - dragSession.startScreenY;
        if (!dragSession.moved && Math.abs(dx) + Math.abs(dy) > 6) {
          dragSession.moved = true;
          petHitbox.classList.add("dragging");
        }

        if (!dragSession.moved) {
          return;
        }

        window.desktopShell.movePetWindow(dragSession.startX + dx, dragSession.startY + dy);
      }

      function endDrag(event) {
        if (!dragSession) {
          return;
        }

        const moved = dragSession.moved;
        dragSession = null;
        petHitbox.classList.remove("pressed", "dragging");

        if (petHitbox.hasPointerCapture(event.pointerId)) {
          petHitbox.releasePointerCapture(event.pointerId);
        }

        if (!moved) {
          playClickBounce();
        }
      }

      petHitbox.addEventListener("pointerenter", () => {
        petHitbox.classList.add("hovering");
      });

      petHitbox.addEventListener("pointerleave", () => {
        petHitbox.classList.remove("hovering");
      });

      petHitbox.addEventListener("pointerdown", (event) => {
        beginDrag(event);
      });

      petHitbox.addEventListener("pointermove", (event) => {
        updateDrag(event);
      });

      petHitbox.addEventListener("pointerup", (event) => {
        endDrag(event);
      });

      petHitbox.addEventListener("pointercancel", (event) => {
        endDrag(event);
      });

      menuToggle.addEventListener("click", () => {
        setMenuOpen(!menuOpen);
      });

      openSearchButton.addEventListener("click", async () => {
        await window.desktopShell.showSearchWindow();
        setMenuOpen(false);
      });

      window.addEventListener("click", (event) => {
        if (!event.target.closest(".menu-anchor")) {
          setMenuOpen(false);
        }
      });

      window.desktopShell.onShellState((state) => {
        renderShellState(state);
      });

      window.desktopShell.getShellState().then((state) => {
        renderShellState(state);
      });
    </script>
  </body>
</html>
